<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Ninja</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-container">

    <div class="page-header">
        <h1 class="page-title">Adicionar Ninja</h1>
        <a th:href="@{/ninjas/ui/listar}" class="btn btn-outline">&#8592; Voltar</a>
    </div>

    <div class="form-card">

        <div th:if="${mensagem}" class="alert-success" th:text="${mensagem}"></div>

        <form th:action="@{/ninjas/ui/salvar}" th:object="${ninja}" method="post">

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Naruto Uzumaki" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="ninja@konoha.com" required>
            </div>

            <div class="form-group">
                <label for="imgUrl">URL da Imagem</label>
                <input type="text" id="imgUrl" th:field="*{imgUrl}" placeholder="https://..." required>
            </div>

            <div class="form-divider"></div>

            <div class="form-group">
                <label for="idade">Idade</label>
                <input type="number" id="idade" th:field="*{idade}" placeholder="16" required>
            </div>

            <div class="form-group">
                <label for="rank">Rank</label>
                <input type="text" id="rank" th:field="*{rank}" placeholder="Ex: Genin, Chunin, Jonin">
            </div>

            <div class="form-divider"></div>

            <button type="submit" class="btn btn-primary btn-submit">Cadastrar Ninja</button>

        </form>

    </div>

</div>

</body>
</html>
