<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Ninjas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-container">

    <div class="page-header">
        <h1 class="page-title">Lista de Ninjas</h1>
        <a th:href="@{/ninjas/ui/adicionar}" class="btn btn-primary btn-lg">+ Adicionar Ninja</a>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ninja</th>
                        <th>Email</th>
                        <th>Idade</th>
                        <th>Rank</th>
                        <th>Missão</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(ninjas)}">
                        <td colspan="7">
                            <div class="empty-state">
                                <p>Nenhum ninja cadastrado ainda.</p>
                            </div>
                        </td>
                    </tr>
                    <tr th:each="ninja : ${ninjas}">
                        <td th:text="${ninja.id}"></td>
                        <td>
                            <div class="ninja-cell">
                                <img th:src="${ninja.imgUrl}" class="ninja-avatar" alt="avatar">
                                <span th:text="${ninja.nome}"></span>
                            </div>
                        </td>
                        <td th:text="${ninja.email}"></td>
                        <td th:text="${ninja.idade}"></td>
                        <td><span class="badge" th:text="${ninja.rank}"></span></td>
                        <td>
                            <span th:if="${ninja.missoes != null}" class="badge" th:text="${ninja.missoes.nome}"></span>
                            <span th:if="${ninja.missoes == null}" class="no-data">Sem missão</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/ninjas/ui/listar/{id}(id=${ninja.id})}" class="btn btn-info">Detalhes</a>
                                <a th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}" class="btn btn-danger">Deletar</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
