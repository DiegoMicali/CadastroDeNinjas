<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Ninja</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-container">

    <div class="page-header">
        <h1 class="page-title">Detalhes do Ninja</h1>
        <a th:href="@{/ninjas/ui/listar}" class="btn btn-outline">&#8592; Voltar</a>
    </div>

    <div class="profile-card">

        <div class="profile-header">
            <img th:src="${ninja.imgUrl}" class="profile-avatar" alt="avatar">
            <h2 class="profile-name" th:text="${ninja.nome}"></h2>
            <span class="badge" th:text="${ninja.rank}"></span>
        </div>

        <div class="profile-body">

            <div class="info-grid">
                <div class="info-item">
                    <label>Email</label>
                    <span th:text="${ninja.email}"></span>
                </div>
                <div class="info-item">
                    <label>Idade</label>
                    <span th:text="${ninja.idade}"></span>
                </div>
                <div class="info-item">
                    <label>ID</label>
                    <span th:text="${ninja.id}"></span>
                </div>
                <div class="info-item">
                    <label>Rank</label>
                    <span th:text="${ninja.rank}"></span>
                </div>
            </div>

            <p class="section-label">Missão Atribuída</p>

            <div th:if="${ninja.missoes != null}" class="missao-row">
                <span th:text="${ninja.missoes.nome}"></span>
                <span class="badge" th:text="${ninja.missoes.rank}"></span>
            </div>
            <p th:if="${ninja.missoes == null}" class="no-data">Nenhuma missão atribuída a este ninja.</p>

        </div>

        <div class="profile-footer">
            <a th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}" class="btn btn-danger">Deletar Ninja</a>
        </div>

    </div>

</div>

</body>
</html>
